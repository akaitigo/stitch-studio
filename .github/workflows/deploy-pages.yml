name: GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Cache wasm-pack
        uses: actions/cache@v6
        with:
          path: ~/.cargo/bin/wasm-pack
          key: ${{ runner.os }}-wasm-pack-0.14.0
      - name: Build WASM
        working-directory: wasm
        run: |
          command -v wasm-pack || cargo +stable install wasm-pack --version 0.14.0 --locked
          wasm-pack build --target web --out-dir ../frontend/src/wasm-pkg
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6
      - name: Build frontend
        working-directory: frontend
        run: npm run build -- --base "${{ steps.pages.outputs.base_path }}/"
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/dist

  deploy:
    name: Deploy
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5
